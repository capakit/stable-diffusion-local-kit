tests:
  - id: generates-one-image-through-stable-diffusion-cpp
    kind: http
    target:
      workload: image-generator
      endpoint: /test
    request:
      method: POST
      path: /generates-one-image-through-stable-diffusion-cpp
    verbose_output:
      - $.body.image_count
      - $.body.image_bytes
      - $.body.has_url
    validations:
      - $.status_code.eq(200)
      - $.body.image_count.gte(1)
      - $.body.image_bytes.gte(100)
  - id: image-generator-workload-typechecks
    kind: exec
    target:
      workload: image-generator
    request:
      command:
        - bun
        - x
        - tsc
        - --noEmit
    validations:
      - $.exit_code.eq(0)
